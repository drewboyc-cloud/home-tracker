<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tracker">
<meta name="theme-color" content="#16213e">
<link rel="manifest" href="manifest.json">
<title>Home Tracker</title>
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #16213e;
    --surface3: #0d2137;
    --accent: #4f8ef7;
    --accent2: #7c5cbf;
    --green: #2ecc71;
    --yellow: #f39c12;
    --red: #e74c3c;
    --text: #e8e8f0;
    --text2: #8888aa;
    --border: #2a2a45;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 34px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; overflow: hidden; }

  /* ── App shell ── */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  #header {
    padding: calc(var(--safe-top) + 8px) 20px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  #header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  #header-btns { display: flex; gap: 10px; }
  .icon-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 7px 10px; font-size: 16px; cursor: pointer; color: var(--text); }

  /* ── Tab bar ── */
  #tabbar {
    display: flex; background: var(--surface); border-top: 1px solid var(--border);
    padding-bottom: var(--safe-bottom); flex-shrink: 0;
  }
  .tab-btn { flex: 1; padding: 12px 0 8px; background: none; border: none; color: var(--text2); font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color .2s; }
  .tab-btn.active { color: var(--accent); }
  .tab-btn .tab-icon { font-size: 22px; }

  /* ── Screens ── */
  #screens { flex: 1; overflow: hidden; position: relative; }
  .screen { position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; display: none; padding: 16px 16px calc(16px + var(--safe-bottom)); }
  .screen.active { display: block; }

  /* ── Section headers ── */
  .section-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; padding: 0 4px; }
  .section-label:first-child { margin-top: 4px; }

  /* ── Cards ── */
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; cursor: pointer; transition: transform .15s, background .15s; active-scale: 0.98; }
  .card:active { transform: scale(0.98); background: var(--surface2); }
  .card-inner { display: flex; align-items: center; padding: 14px 16px; gap: 14px; }
  .card-icon { font-size: 28px; flex-shrink: 0; }
  .card-body { flex: 1; min-width: 0; }
  .card-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .card-badge { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
  .badge.green { background: rgba(46,204,113,.18); color: var(--green); }
  .badge.yellow { background: rgba(243,156,18,.18); color: var(--yellow); }
  .badge.red { background: rgba(231,76,60,.18); color: var(--red); }
  .badge.blue { background: rgba(79,142,247,.18); color: var(--accent); }
  .badge.purple { background: rgba(124,92,191,.22); color: #a78bfa; }
  .badge.teal { background: rgba(20,184,166,.18); color: #2dd4bf; }
  .chevron { color: var(--text2); font-size: 14px; }

  /* ── Sheet overlay ── */
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; display: none; backdrop-filter: blur(4px); }
  #overlay.show { display: block; }
  #sheet {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 101;
    background: var(--surface); border-radius: 24px 24px 0 0;
    padding: 0 20px calc(20px + var(--safe-bottom));
    transform: translateY(100%); transition: transform .35s cubic-bezier(.32,1,.23,1);
    max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  #sheet.show { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 20px; }
  .sheet-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .sheet-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

  /* ── Sheet sections ── */
  .sheet-info-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .sheet-info-label { font-size: 13px; color: var(--text2); }
  .sheet-info-value { font-size: 14px; font-weight: 600; }

  /* ── Buttons ── */
  .btn { width: 100%; padding: 15px; border-radius: 14px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px; transition: opacity .2s; }
  .btn:active { opacity: .8; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: rgba(231,76,60,.15); color: var(--red); border: 1px solid rgba(231,76,60,.3); }

  /* ── Date input ── */
  .date-input-row { margin-top: 16px; }
  .date-input-row label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .date-input-row input[type=date] {
    width: 100%; padding: 13px 16px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 15px; outline: none;
    color-scheme: dark;
  }

  /* ── History list ── */
  .history-section { margin-top: 24px; }
  .history-section h3 { font-size: 14px; font-weight: 600; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .8px; }
  .history-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 8px; }
  .history-item:last-child { border-bottom: none; }
  .history-item-left { flex: 1; min-width: 0; }
  .history-date { font-size: 14px; }
  .history-notes { font-size: 12px; color: var(--text2); margin-top: 3px; word-break: break-word; }
  .history-delete { background: none; border: none; color: var(--red); font-size: 18px; cursor: pointer; padding: 4px 8px; flex-shrink: 0; }
  .history-empty { font-size: 13px; color: var(--text2); padding: 10px 0; }

  /* ── Service type buttons ── */
  .service-btn-row { display: flex; gap: 10px; margin-top: 12px; }
  .service-btn-row .btn { flex: 1; margin-top: 0; font-size: 14px; padding: 13px 8px; }
  .btn-chemical { background: rgba(124,92,191,.18); color: #a78bfa; border: 1px solid rgba(124,92,191,.35); }
  .btn-gas { background: rgba(20,184,166,.12); color: #2dd4bf; border: 1px solid rgba(20,184,166,.3); }
  .btn-checked { background: rgba(46,204,113,.12); color: var(--green); border: 1px solid rgba(46,204,113,.3); }

  /* ── Notes textarea ── */
  .notes-textarea {
    width: 100%; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 14px; outline: none; resize: none;
    font-family: inherit; min-height: 80px; margin-top: 8px; color-scheme: dark;
  }

  /* ── Settings ── */
  .settings-group { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 10px; }
  .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; gap: 12px; }
  .settings-row:last-child { border-bottom: none; }
  .settings-row-left { display: flex; align-items: center; gap: 12px; }
  .settings-icon { font-size: 20px; width: 28px; text-align: center; }
  .settings-label { font-size: 15px; }
  .settings-value { font-size: 13px; color: var(--text2); }

  /* ── First-run wizard ── */
  #wizard { position: fixed; inset: 0; z-index: 200; background: var(--bg); overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 0 40px; }
  #wizard.hidden { display: none; }
  .wizard-header { padding: calc(var(--safe-top) + 20px) 24px 20px; }
  .wizard-header h1 { font-size: 28px; font-weight: 800; line-height: 1.2; }
  .wizard-header p { font-size: 15px; color: var(--text2); margin-top: 8px; }
  .wizard-step { padding: 0 20px; }
  .wizard-step-title { font-size: 18px; font-weight: 700; margin: 20px 0 4px; padding: 0 4px; }
  .wizard-step-sub { font-size: 13px; color: var(--text2); padding: 0 4px; margin-bottom: 12px; }
  .wizard-item { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 10px; }
  .wizard-item label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 10px; }
  .wizard-item input[type=date] {
    width: 100%; padding: 11px 14px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 14px; outline: none; color-scheme: dark;
  }
  .wizard-item .hint { font-size: 11px; color: var(--text2); margin-top: 6px; }
  .wizard-footer { padding: 20px; position: sticky; bottom: 0; background: var(--bg); padding-bottom: calc(20px + var(--safe-bottom)); }

  /* ── Notification banner ── */
  #notif-banner {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 100px);
    left: 16px; right: 16px; z-index: 300;
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 13px 16px;
    font-size: 15px; font-weight: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    opacity: 0; pointer-events: none;
    transform: translateY(20px);
    transition: opacity .3s ease, transform .3s ease;
  }
  #notif-banner.show { opacity: 1; pointer-events: auto; transform: translateY(0); }

  /* ── Empty state ── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-state .em { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; line-height: 1.5; }

  /* ── Toggle ── */
  .toggle { position: relative; width: 48px; height: 28px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 14px; cursor: pointer; transition: .3s; }
  .toggle-slider::before { content: ''; position: absolute; width: 22px; height: 22px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s; }
  .toggle input:checked + .toggle-slider { background: var(--accent); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

  /* iOS input styling fixes */
  input { -webkit-appearance: none; appearance: none; }

  .divider { height: 1px; background: var(--border); margin: 8px 0; }

  /* Pill row for condo dates */
  .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; }
  .pill.active { background: rgba(79,142,247,.15); border-color: var(--accent); color: var(--accent); }

  /* Alert dot */
  .alert-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f2f2f7; --surface: #fff; --surface2: #f2f2f7; --surface3: #e5e5ea;
      --text: #1c1c1e; --text2: #8e8e93; --border: #e5e5ea; --accent: #007aff;
    }
    .card { box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  }
</style>
</head>
<body>

<!-- ── Notification banner ── -->
<div id="notif-banner"></div>

<!-- ── First-run wizard ── -->
<div id="wizard">
  <div class="wizard-header">
    <h1>Welcome to<br>Home Tracker 🏠</h1>
    <p>Let's set up your schedules. Enter the last date each task was done — we'll calculate the next due dates automatically.</p>
  </div>
  <div class="wizard-step" id="wizard-content"></div>
  <div class="wizard-footer">
    <button class="btn btn-primary" id="wizard-next-btn">Continue →</button>
  </div>
</div>

<!-- ── Main app ── -->
<div id="app">
  <div id="header">
    <h1 id="header-title">🏠 Home Tracker</h1>
    <div id="header-btns">
      <button class="icon-btn" id="notif-btn" title="Notifications">🔔</button>
    </div>
  </div>

  <div id="screens">
    <div class="screen active" id="screen-home">
      <!-- populated by JS -->
    </div>
    <div class="screen" id="screen-settings">
      <!-- populated by JS -->
    </div>
  </div>

  <div id="tabbar">
    <button class="tab-btn active" data-screen="home">
      <span class="tab-icon">🏠</span>Home
    </button>
    <button class="tab-btn" data-screen="settings">
      <span class="tab-icon">⚙️</span>Settings
    </button>
  </div>
</div>

<!-- ── Sheet ── -->
<div id="overlay"></div>
<div id="sheet">
  <div class="sheet-handle"></div>
  <div id="sheet-content"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════════════════════════════

const STORAGE_KEY = 'tracker_data_v4';

function defaultData() {
  return {
    items: {
      // Home – water filters
      zerowater: {
        id: 'zerowater', icon: '💧', title: 'ZeroWater Filter', section: 'home',
        type: 'recurring', intervalDays: 120, alertDays: 7,
        lastDone: null, nextDue: null, history: []
      },
      brita: {
        id: 'brita', icon: '💧', title: 'Brita Filter', section: 'home',
        type: 'recurring', intervalDays: 90, alertDays: 7,
        lastDone: null, nextDue: null, history: []
      },
      // Home – aircond
      aircond_master: {
        id: 'aircond_master', icon: '❄️', title: 'Aircond – Master', section: 'home',
        type: 'recurring', intervalDays: 90, alertDays: 7,
        lastDone: null, nextDue: null, history: []
      },
      aircond_hall: {
        id: 'aircond_hall', icon: '❄️', title: 'Aircond – Hall', section: 'home',
        type: 'max_interval', intervalDays: 365, alertDays: 0,
        lastDone: null, nextDue: null, history: []
      },
      aircond_study: {
        id: 'aircond_study', icon: '❄️', title: 'Aircond – Study', section: 'home',
        type: 'history_only', intervalDays: 365, alertDays: 0,
        lastDone: null, nextDue: null, history: []
      },
      aircond_back: {
        id: 'aircond_back', icon: '❄️', title: 'Aircond – Back Room', section: 'home',
        type: 'history_only', intervalDays: 365, alertDays: 0,
        lastDone: null, nextDue: null, history: []
      },
      aircond_gas: {
        id: 'aircond_gas', icon: '⛽', title: 'Aircond Gas Top-Up', section: 'home',
        type: 'log_only',
        lastDone: null, history: []
      },
      // Home – condo fees (no push-back, fixed dates)
      condo: {
        id: 'condo', icon: '🏢', title: 'Meyer Condo Fees', section: 'home',
        type: 'condo', alertDays: 5,
        lastDone: null, nextDue: null, history: []
      },
    },
    setupComplete: false,
    notificationsEnabled: false
  };
}

// ═══════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════

let appData = null;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      // Merge to pick up any new default items
      const def = defaultData();
      appData = {
        ...def,
        ...saved,
        items: { ...def.items, ...saved.items }
      };
    } else {
      appData = defaultData();
    }
  } catch (e) {
    appData = defaultData();
  }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
}

// ═══════════════════════════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════════════════════════

function today() {
  const d = new Date();
  return dateStr(d);
}

function dateStr(d) {
  return d.toISOString().split('T')[0];
}

function parseDate(str) {
  if (!str) return null;
  return new Date(str + 'T00:00:00');
}

function addDays(ds, days) {
  const d = parseDate(ds);
  d.setDate(d.getDate() + days);
  return dateStr(d);
}

function daysDiff(fromStr, toStr) {
  const from = parseDate(fromStr);
  const to = parseDate(toStr);
  return Math.round((to - from) / 86400000);
}

function formatDate(str) {
  if (!str) return '—';
  const d = parseDate(str);
  return d.toLocaleDateString('en-SG', { day: 'numeric', month: 'short', year: 'numeric' });
}

// ── History entry helpers (entries can be strings OR objects {date,type,notes}) ──
function hDate(entry) { return typeof entry === 'string' ? entry : entry.date; }
function hType(entry) { return typeof entry === 'string' ? 'normal' : (entry.type || 'normal'); }
function hNotes(entry) { return typeof entry === 'string' ? '' : (entry.notes || ''); }

function typeBadge(type) {
  if (type === 'chemical') return '<span class="badge purple" style="font-size:10px;padding:2px 8px;">Chemical</span>';
  if (type === 'gas') return '<span class="badge teal" style="font-size:10px;padding:2px 8px;">Gas Top-Up</span>';
  if (type === 'checked') return '<span class="badge green" style="font-size:10px;padding:2px 8px;">Checked OK</span>';
  return '<span class="badge blue" style="font-size:10px;padding:2px 8px;">Normal</span>';
}

// Returns how far back to show history based on item type
function historyWindowDate(id) {
  const fiveYearIds = ['aircond_master','aircond_hall','aircond_study','aircond_back','aircond_gas','zerowater','brita'];
  return fiveYearIds.includes(id) ? addDays(today(), -1825) : addDays(today(), -1095);
}

// Next condo fee due date (fixed: Apr 30, Jul 31, Oct 31, Jan 31)
function nextCondoDue() {
  const CONDO_DATES = [
    { month: 4, day: 30 },
    { month: 7, day: 31 },
    { month: 10, day: 31 },
    { month: 1, day: 31 }
  ];
  const t = new Date();
  const year = t.getFullYear();
  let candidates = [];
  for (let y = year - 1; y <= year + 1; y++) {
    for (const cd of CONDO_DATES) {
      candidates.push(new Date(y, cd.month - 1, cd.day));
    }
  }
  candidates.sort((a, b) => a - b);
  const todayD = new Date(today() + 'T00:00:00');
  const future = candidates.filter(d => d >= todayD);
  return future.length > 0 ? dateStr(future[0]) : null;
}

// ═══════════════════════════════════════════════════════════
// ITEM STATUS LOGIC
// ═══════════════════════════════════════════════════════════

function getStatus(item) {
  const t = today();

  if (item.type === 'log_only') {
    if (!item.lastDone) return { color: 'green', label: 'No logs yet', days: null, due: null };
    const daysSince = daysDiff(item.lastDone, t);
    return { color: 'green', label: `${daysSince}d ago`, days: null, due: null };
  }

  if (item.type === 'condo') {
    const due = nextCondoDue();
    if (!due) return { color: 'green', label: 'OK', days: null, due };
    const diff = daysDiff(t, due);
    item.nextDue = due;
    if (diff < 0) return { color: 'red', label: 'Overdue!', days: diff, due };
    if (diff <= 5) return { color: 'red', label: `${diff}d to go`, days: diff, due };
    if (diff <= 14) return { color: 'yellow', label: `${diff}d to go`, days: diff, due };
    return { color: 'green', label: `${diff}d to go`, days: diff, due };
  }

  if (item.type === 'history_only' || item.type === 'max_interval') {
    if (!item.lastDone) return { color: 'yellow', label: 'No data', days: null, due: null };
    const daysSince = daysDiff(item.lastDone, t);
    if (daysSince >= item.intervalDays) return { color: 'red', label: `${daysSince}d since`, days: -daysSince, due: null };
    if (daysSince >= item.intervalDays - 30) return { color: 'yellow', label: `${daysSince}d since`, days: null, due: null };
    return { color: 'green', label: `${daysSince}d since`, days: null, due: null };
  }

  // recurring
  if (!item.lastDone && !item.nextDue) return { color: 'yellow', label: 'Not set', days: null, due: null };
  const due = item.nextDue || addDays(item.lastDone, item.intervalDays);
  const diff = daysDiff(t, due);
  if (diff < 0) return { color: 'red', label: `${Math.abs(diff)}d overdue`, days: diff, due };
  if (diff === 0) return { color: 'red', label: 'Due today!', days: 0, due };
  if (diff <= item.alertDays) return { color: 'yellow', label: `${diff}d to go`, days: diff, due };
  return { color: 'green', label: `${diff}d to go`, days: diff, due };
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════

function renderAll() {
  renderScreen('home');
  renderSettings();
}

function renderScreen(section) {
  const screen = document.getElementById(`screen-${section}`);
  const items = Object.values(appData.items).filter(i => i.section === section);

  if (section === 'home') {
    const water = items.filter(i => i.id === 'zerowater' || i.id === 'brita');
    const aircon = items.filter(i => i.id.startsWith('aircond') && i.id !== 'aircond_gas');
    const gas = items.filter(i => i.id === 'aircond_gas');

function renderSheet(id) {
  const item = appData.items[id];
  const status = getStatus(item);
  const isCondo = item.type === 'condo';
  const isHistOnly = item.type === 'history_only';
  const isAircond = id.startsWith('aircond') && id !== 'aircond_gas';
  const isGas = id === 'aircond_gas';
  const isLogOnly = item.type === 'log_only';

  let dueRow = '';

    dueRow = `<div class="sheet-info-row"><span class="sheet-info-label">Next Payment Due</span><span class="sheet-info-value">${formatDate(status.due)}</span></div>`;
    dueRow += `<div class="sheet-info-row"><span class="sheet-info-label">All Due Dates</span></div>
      <div class="pill-row">
        <span class="pill">30 Jan</span><span class="pill">30 Apr</span><span class="pill">31 Jul</span><span class="pill">31 Oct</span>
      </div><br>`;
  } else if (!isHistOnly && !isLogOnly && item.nextDue) {
    const redStyle = status.color === 'red' ? ' style="color:var(--red)"' : '';
    dueRow = `<div class="sheet-info-row"><span class="sheet-info-label">Next Due</span><span class="sheet-info-value"${redStyle}>${formatDate(item.nextDue)}</span></div>`;
  }

  const intervalRow = (!isCondo && !isLogOnly && item.intervalDays)
    ? `<div class="sheet-info-row"><span class="sheet-info-label">Interval</span><span class="sheet-info-value">Every ${item.intervalDays} days</span></div>` : '';

  let actionBtns = '';
  if (isCondo) {
    actionBtns = `
      <button class="btn btn-primary" onclick="logCondoPayment(today())">✅ Paid Today</button>
      <button class="btn btn-secondary" onclick="showCondoPicker()">📅 Paid on Different Date</button>`;
  } else if (isGas) {
    actionBtns = `
      <div class="service-btn-row">
        <button class="btn btn-gas" onclick="showGasPicker()">⛽ Log Gas Top-Up</button>
        <button class="btn btn-checked" onclick="showCheckedPicker('gas')">✅ Checked OK</button>
      </div>`;
  } else if (isAircond) {
    const isHall = id === 'aircond_hall';
    actionBtns = `
      <div class="service-btn-row">
        <button class="btn btn-primary" onclick="showAircondPicker('normal')">🔧 Normal Service</button>
        <button class="btn btn-chemical" onclick="showAircondPicker('chemical')">🧪 Chemical Clean</button>
      </div>
      ${isHall ? `<button class="btn btn-checked" onclick="showCheckedPicker('hall')" style="margin-top:10px;">✅ Checked OK</button>` : ''}`;
  } else if (isHistOnly) {
    actionBtns = `<button class="btn btn-primary" onclick="showDatePicker('service')">🔧 Log Service Date</button>`;
  } else {
    actionBtns = `
      <button class="btn btn-primary" onclick="markDoneToday()">✅ Done Today</button>
      <button class="btn btn-secondary" onclick="showDatePicker('done')">📅 Done on Different Date</button>`;
  }

  // History — window depends on item type
  const windowDate = historyWindowDate(id);
  const fiveYearItem = ['aircond_master','aircond_hall','aircond_study','aircond_back','aircond_gas','zerowater','brita'].includes(id);
  const hist = (item.history || [])
    .filter(e => hDate(e) >= windowDate)
    .sort((a, b) => hDate(b).localeCompare(hDate(a)))
    .slice(0, 100);

  const histHTML = hist.length
    ? hist.map((e, i) => {
        const showType = isAircond || isGas;
        const notes = hNotes(e);
        return `
          <div class="history-item" id="hist-item-${id}-${i}">
            <div class="history-item-left">
              <div class="history-date" style="display:flex;align-items:center;gap:8px;">

            </div>
            <button class="history-delete" onclick="askDeleteHistory('${id}',${i})" title="Remove">✕</button>
          </div>`;
      }).join('')
    : '<div class="history-empty">No history recorded yet.</div>';

  const histYears = fiveYearItem ? '5 years' : '3 years';

    <div class="sheet-info-row"><span class="sheet-info-label">Last Done</span><span class="sheet-info-value">${formatDate(item.lastDone)}</span></div>
    ${dueRow}
    ${intervalRow}

function applyDone(id, ds, serviceType, notes) {
  const item = appData.items[id];
  const isAircond = id.startsWith('aircond') && id !== 'aircond_gas';
  if (isAircond) {
    addHistoryEntry(item, { date: ds, type: serviceType || 'normal', notes: notes || '' });
  } else {
    addHistoryEntry(item, ds);
  }
  item.lastDone = ds;
  if (item.type !== 'condo' && item.type !== 'history_only' && item.type !== 'log_only') {
    item.nextDue = addDays(ds, item.intervalDays);
  }
  saveData();
  renderAll();
  renderSheet(id);
  showBanner('✅ Date recorded!');
  scheduleNotifications();
}

// addHistoryEntry: entry is either a date string or {date, type, notes} object
function addHistoryEntry(item, entry) {
  if (!item.history) item.history = [];
  const entryDate = hDate(entry);
  const entryType = hType(entry);
  // For object entries (aircond/gas): allow multiple per day if different type
  // For string entries: deduplicate by date
  if (typeof entry === 'string') {
    if (!item.history.some(e => hDate(e) === entry)) {
      item.history.push(entry);
    }
  } else {
    // avoid exact duplicate (same date + same type)
    const isDupe = item.history.some(e => hDate(e) === entryDate && hType(e) === entryType);
    if (!isDupe) item.history.push(entry);
  }
  item.history.sort((a, b) => hDate(a).localeCompare(hDate(b)));
}

// Keep old name as alias for non-aircond items
function addHistory(item, ds) { addHistoryEntry(item, ds); }

function askDeleteHistory(id, index) {
  const rowEl = document.getElementById(`hist-item-${id}-${index}`);
  if (!rowEl) return;
  // Replace the ✕ button with inline Cancel / Delete
  const btn = rowEl.querySelector('.history-delete');
  if (!btn) return;
  btn.outerHTML = `
    <div style="display:flex;gap:6px;flex-shrink:0;">
      <button onclick="cancelDeleteHistory('${id}',${index})"
        style="background:none;border:1px solid var(--text2);color:var(--text2);border-radius:8px;padding:4px 10px;font-size:13px;cursor:pointer;">Cancel</button>
      <button onclick="deleteHistory('${id}',${index})"
        style="background:var(--red);border:none;color:#fff;border-radius:8px;padding:4px 10px;font-size:13px;cursor:pointer;">Delete</button>
    </div>`;
}

function cancelDeleteHistory(id, index) {
  // Re-render the sheet to restore the ✕ button
  renderSheet(id);
}

function deleteHistory(id, index) {
  const item = appData.items[id];
  const windowDate = historyWindowDate(id);
  const sorted = (item.history || [])
    .filter(e => hDate(e) >= windowDate)
    .sort((a, b) => hDate(b).localeCompare(hDate(a)));
  const toRemove = sorted[index];
  if (!toRemove) return;
  const toRemoveDate = hDate(toRemove);
  const toRemoveType = hType(toRemove);
  // Remove matching entry from full history
  item.history = (item.history || []).filter(e => {
    if (hDate(e) !== toRemoveDate) return true;
    if (typeof toRemove === 'object' && typeof e === 'object') return hType(e) !== toRemoveType;
    if (typeof toRemove === 'string' && typeof e === 'string') return false;
    return true;
  });
  // Update lastDone if we removed it
  if (item.lastDone === toRemoveDate && !item.history.some(e => hDate(e) === toRemoveDate)) {
    const remaining = (item.history || []).map(e => hDate(e)).sort();
    item.lastDone = remaining.length ? remaining[remaining.length - 1] : null;
    if (item.lastDone && item.type !== 'history_only' && item.type !== 'condo' && item.type !== 'log_only') {
      item.nextDue = addDays(item.lastDone, item.intervalDays);
    }
  }
  saveData();
  renderAll();
  renderSheet(id);
}

function exportData() {
  const json = JSON.stringify(appData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tracker-backup-${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showBanner('📤 Backup exported!');
}

function exportToiCloud() {
  // On iOS, downloading triggers the Files app where user can choose iCloud Drive
  exportData();
  showBanner('☁️ Choose iCloud Drive in Files to save there');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.items) throw new Error('Invalid backup file');
      appData = imported;
      saveData();
      renderAll();
      showBanner('📥 Data restored!');
    } catch (err) {
      showBanner('❌ Invalid backup file');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function clearAllData() {
  if (!confirm('Clear ALL data? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  appData = defaultData();
  saveData();
  renderAll();
  showBanner('🗑️ Data cleared');
}

async function toggleNotifications(enabled) {
  if (enabled) {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      appData.notificationsEnabled = false;
      document.getElementById('notif-toggle').checked = false;
      showBanner('❌ Notification permission denied');
      return;
    }
    appData.notificationsEnabled = true;
    showBanner('🔔 Notifications enabled!');
    scheduleNotifications();
  } else {
    appData.notificationsEnabled = false;
    showBanner('🔕 Notifications disabled');
    if (navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({ type: 'CANCEL_ALL' });
    }
  }
  saveData();
  renderSettings();
}

function scheduleNotifications() {
  if (!appData.notificationsEnabled) return;
  if (!navigator.serviceWorker.controller) return;

  const notifications = [];
  const t = today();

  for (const item of Object.values(appData.items)) {
    const status = getStatus(item);

    if (item.type === 'condo') {
      if (status.due && status.days !== null && status.days >= 0 && status.days <= 7) {
        const fireAt = addDays(status.due, -5);
        if (fireAt >= t) {
          notifications.push({
            id: `${item.id}_due`,
            title: '🏢 Condo Fees Due Soon',
            body: `Meyer Condo payment due on ${formatDate(status.due)}`,
            fireAt: fireAt + 'T09:00:00'
          });
        }
      }
      continue;
    }

    if (!item.nextDue && item.type === 'recurring') continue;

    if (item.type === 'recurring' && item.nextDue) {
      const alertDate = addDays(item.nextDue, -item.alertDays);
      if (alertDate >= t) {
        notifications.push({
          id: `${item.id}_alert`,
          title: `⏰ ${item.title} Due Soon`,
          body: `Due on ${formatDate(item.nextDue)}`,
          fireAt: alertDate + 'T09:00:00'
        });
      }
      // Day-of reminder
      if (item.nextDue >= t) {
        notifications.push({
          id: `${item.id}_due`,
          title: `🔔 ${item.title} Due Today`,
          body: `Don't forget to complete this today!`,
          fireAt: item.nextDue + 'T09:00:00'
        });
      }
    }

    if ((item.type === 'history_only' || item.type === 'max_interval') && item.lastDone) {
      const overdueDate = addDays(item.lastDone, item.intervalDays);
      if (overdueDate >= t) {
        notifications.push({
          id: `${item.id}_overdue`,
          title: `⚠️ ${item.title}`,
          body: `Over a year since last service — schedule soon`,
          fireAt: overdueDate + 'T09:00:00'
        });
      }
    }
  }

  navigator.serviceWorker.controller.postMessage({
    type: 'SCHEDULE_NOTIFICATIONS',
    notifications
  });
}

let bannerTimer = null;
function showBanner(msg) {
  const b = document.getElementById('notif-banner');
  if (bannerTimer) { clearTimeout(bannerTimer); bannerTimer = null; }
  b.textContent = msg;
  b.classList.add('show');
  bannerTimer = setTimeout(() => {
    b.classList.remove('show');
    bannerTimer = null;
  }, 2500);
}

    sub: 'Enter the last date you changed each filter.',
    fields: [
      { id: 'zerowater', label: 'ZeroWater Filter (changes every 120 days)', hint: 'Leave blank if unknown' },
      { id: 'brita', label: 'Brita Filter (changes every 90 days)', hint: 'Leave blank if unknown' }
    ]
  },
  {
    title: '❄️ Air Conditioning',
    sub: 'Enter the last service date for each unit.',
    fields: [
      { id: 'aircond_master', label: 'Master Bedroom AC (serviced every 90 days)', hint: 'Leave blank if unknown' },
      { id: 'aircond_hall', label: 'Hall AC (max once per year)', hint: 'Leave blank if unknown' },
      { id: 'aircond_study', label: 'Study Room AC (alert if >1 year)', hint: 'Leave blank if unknown' },
      { id: 'aircond_back', label: 'Back Room AC (alert if >1 year)', hint: 'Leave blank if unknown' }
    ]
  },
  {
    title: '🏢 Condo Management Fees',
    sub: 'Fixed dates (Apr 30, Jul 31, Oct 31, Jan 31). No setup needed — we track these automatically.',
    fields: []
  },
];

let wizardStep = 0;

function renderWizardStep() {
  const step = WIZARD_STEPS[wizardStep];
  const isLast = wizardStep === WIZARD_STEPS.length - 1;
  const content = document.getElementById('wizard-content');

  content.innerHTML = `
    <div class="wizard-step-title">${step.title}</div>
    <div class="wizard-step-sub">${step.sub}</div>
    ${step.fields.map(f => `
      <div class="wizard-item">
        <label>${f.label}</label>
        <input type="date" id="wiz_${f.id}" max="${today()}">
        <div class="hint">${f.hint}</div>
      </div>
    `).join('')}
  `;
  document.getElementById('wizard-next-btn').textContent = isLast ? 'Get Started 🚀' : 'Continue →';
}

function advanceWizard() {
  // Save current step data
  const step = WIZARD_STEPS[wizardStep];
  for (const f of step.fields) {
    const val = document.getElementById(`wiz_${f.id}`)?.value;
    if (val) {
      const item = appData.items[f.id];
      item.lastDone = val;
      addHistoryEntry(item, item.id.startsWith('aircond') && item.id !== 'aircond_gas' ? { date: val, type: 'normal' } : val);
      if (item.type !== 'history_only' && item.type !== 'condo' && item.type !== 'log_only') {
        item.nextDue = addDays(val, item.intervalDays);
      }
    }
  }

  wizardStep++;
  if (wizardStep >= WIZARD_STEPS.length) {
    appData.setupComplete = true;
    saveData();
    document.getElementById('wizard').classList.add('hidden');
    renderAll();
    scheduleNotifications();
  } else {
    renderWizardStep();
  }
}

function runSetupWizard() {
  closeSheet();
  wizardStep = 0;
  document.getElementById('wizard').classList.remove('hidden');
  renderWizardStep();
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════

function switchTab(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`screen-${screen}`).classList.add('active');
  document.querySelector(`[data-screen="${screen}"]`).classList.add('active');

  const titles = { home: '🏠 Home Tracker', settings: '⚙️ Settings' };
  document.getElementById('header-title').textContent = titles[screen];
}

// ═══════════════════════════════════════════════════════════
// SERVICE WORKER REGISTRATION
// ═══════════════════════════════════════════════════════════

async function registerSW() {
  if ('serviceWorker' in navigator) {
    try {
      const reg = await navigator.serviceWorker.register('/home-tracker/sw.js', { scope: '/home-tracker/' });
      console.log('SW registered:', reg.scope);
    } catch (e) {
      console.warn('SW registration failed:', e);
    }
  }
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════

function init() {
  // Always start with banner hidden
  document.getElementById('notif-banner').classList.remove('show');
  loadData();

  // Tab navigation
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.screen));
  });

  // Sheet close
  document.getElementById('overlay').addEventListener('click', closeSheet);
  document.getElementById('sheet').addEventListener('click', e => e.stopPropagation());

  // Notification bell
  document.getElementById('notif-btn').addEventListener('click', () => {
    switchTab('settings');
    setTimeout(() => {
      document.getElementById('notif-toggle')?.scrollIntoView({ behavior: 'smooth' });
    }, 200);
  });

  // Wizard next btn
  document.getElementById('wizard-next-btn').addEventListener('click', advanceWizard);

  // Register SW
  registerSW();

  // Show wizard or app
  if (!appData.setupComplete) {
    wizardStep = 0;
    renderWizardStep();
  } else {
    document.getElementById('wizard').classList.add('hidden');
    renderAll();
    scheduleNotifications();
  }

  // Re-schedule notifications on visibility change (keeps timers fresh)
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) scheduleNotifications();
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
